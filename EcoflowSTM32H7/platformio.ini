[env:disco_h735ig]
platform = ststm32
board = disco_h735ig
framework = stm32cube
lib_deps =
    https://github.com/BOJIT/PlatformIO-FreeRTOS.git
    lvgl/lvgl @ ^8.3.11
build_flags =
    -mfloat-abi=hard
    -mfpu=fpv4-sp-d16
    -D DATA_IN_ExtSDRAM
    -D HSE_VALUE=8000000
    -D LV_CONF_INCLUDE_SIMPLE
board_build.ldscript = stm32h735ig_flash.ld
board_upload.offset_address = 0x90000000
upload_protocol = custom
upload_command = STM32_Programmer_CLI -c port=SWD -w $SOURCE 0x90000000 -v -el "MX25LM51245G_STM32H735G-DK"
extra_scripts =
    extra_script.py
    merge_firmware.py
